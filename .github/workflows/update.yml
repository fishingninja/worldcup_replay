name: Update WorldCup Replay Data

on:
  schedule:
    # 每5分钟刷新一次（XHS视频URL约10分钟过期）
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install playwright requests

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run Playwright CCTV scraper
        run: python update_replay_links.py

      - name: Fetch XHS video URLs
        run: python fetch_all_video_urls.py

      - name: Generate video_urls.json
        run: python generate_video_urls_json.py

      - name: Sync inline URLs to index.html
        run: python sync_inline_urls.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json video_urls.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update match replay links + XHS video URLs [skip ci]"
            git push
          fi
