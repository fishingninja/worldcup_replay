name: Update WorldCup Replay Data

on:
  schedule:
    # 北京时间 07:00 / 12:00 / 18:00 → UTC 23:00 / 04:00 / 10:00
    - cron: '0 23,4,10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install playwright

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run Playwright CCTV scraper
        run: python update_replay_links.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update match replay links [skip ci]"
            git push
          fi
